services:
  # ── PostgreSQL (with pgvector) ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: salesinject-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: salesinject
    # No host port exposed — only reachable internally
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - salesinject-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: salesinject-redis
    restart: unless-stopped
    networks:
      - salesinject-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redpanda (Kafka-compatible event bus) ──────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.14
    container_name: salesinject-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092
      - --advertise-kafka-addr
      - internal://redpanda:9092
      - --smp
      - "1"
      - --memory
      - "1G"
      - --overprovisioned
    networks:
      - salesinject-internal
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Run Alembic migrations before backend starts ────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-migrate
    env_file: ./backend/.env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    restart: "no"   # run once and exit

  # ── FastAPI backend (gunicorn, 2 workers for 2GB RAM) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - USE_WEBHOOK=true
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - salesinject-internal
    # 2 workers: tuned for 2GB RAM VPS (Hostinger KVM 1)
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:8000 --timeout 120 --log-level info
    deploy:
      resources:
        limits:
          memory: 500M

  # ── Celery workers for Agent OS v2 (domain isolation) ───────────────────────

  # General worker for existing tasks
  celery-general:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-general
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q general
    deploy:
      resources:
        limits:
          memory: 300M

  # Scout domain worker
  celery-scout:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-scout
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q scout
    deploy:
      resources:
        limits:
          memory: 300M

  # Core domain worker (Hermes planning/strategy)
  celery-core:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-core
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q core
    deploy:
      resources:
        limits:
          memory: 300M

  # Ammo domain worker (content generation)
  celery-ammo:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-ammo
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2 -Q ammo
    deploy:
      resources:
        limits:
          memory: 300M

  # Bounty domain worker (matching and contracts)
  celery-bounty:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-bounty
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=1 -Q bounty
    deploy:
      resources:
        limits:
          memory: 300M

  # Fast domain worker (low-latency operations)
  celery-fast:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-celery-fast
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q fast
    deploy:
      resources:
        limits:
          memory: 300M

  # ── Celery Beat ─────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salesinject-beat
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - salesinject-internal
    command: celery -A app.worker.celery_app beat --loglevel=info
    deploy:
      resources:
        limits:
          memory: 150M

  # ── Frontend (nginx static) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the React app at the VPS nginx (no domain yet = use IP)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: salesinject-frontend
    restart: unless-stopped
    networks:
      - salesinject-internal
    deploy:
      resources:
        limits:
          memory: 100M

  # ── nginx reverse proxy (public-facing) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: salesinject-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"   # ready for SSL — no cert needed yet
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/salesinject.conf:ro
      # Certbot SSL (uncomment when you have a domain):
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - salesinject-internal
    deploy:
      resources:
        limits:
          memory: 50M

volumes:
  postgres_data:

networks:
  salesinject-internal:
    driver: bridge

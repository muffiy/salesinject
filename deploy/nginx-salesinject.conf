# /etc/nginx/sites-available/salesinject.conf
server {
    listen 80;
    server_name your.domain.com;

    # ── Frontend static files ─────────────────────────────────────────────
    root /opt/salesinject/frontend/dist;
    index index.html;

    # API proxy to FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenClaw proxy (if on same VPS)
    location /openclaw/ {
        proxy_pass http://127.0.0.1:18789/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram webhook (when USE_WEBHOOK=true)
    location /webhook/telegram {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for all non-file, non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}